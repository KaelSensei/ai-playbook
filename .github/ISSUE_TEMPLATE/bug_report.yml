name: Bug report
description: A rule, command, skill, setup, or CLI feature is broken or behaves unexpectedly
title: '[bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce it.

        **If this is a security issue, do not open a public issue.** See
        [SECURITY.md](../blob/main/SECURITY.md) for private reporting.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug and the impact.
      placeholder: When I run `/feature add X`, the AI creates a branch but never commits...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps so a maintainer can hit the same problem.
      placeholder: |
        1. Clone the playbook
        2. Run `bash .agents/setups/dev-squad-v2/install.sh`
        3. Open the project in Claude Code
        4. Type `/start`
        5. Observe ...
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Which part of the playbook is affected?
      multiple: true
      options:
        - .agents/rules (persistent rules)
        - .agents/commands (slash commands)
        - .agents/skills (on-demand skills)
        - .agents/setups/dev-squad-v2
        - .agents/setups/pm-ba-squad-v2
        - .agents/setups/legacy-agents-v1
        - .agents/setups/web2-agents-v1
        - .agents/setups/web3-agents-v3
        - cli/ (CLI tool)
        - Root docs
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Which AI tool are you using?
      options:
        - Claude Code
        - Cursor
        - Other
        - Not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Playbook version / commit
      description: Git commit SHA or tag of the playbook you have installed.
      placeholder: e.g. main @ 26a15fb
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Node version, and anything else relevant.
      placeholder: |
        - OS: macOS 15.3
        - Shell: zsh
        - Node: 20.11.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. Redact anything sensitive.
      render: shell
    validations:
      required: false
